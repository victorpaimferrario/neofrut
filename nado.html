<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neofrut Campo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a5c1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="logo.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --verde:#1a5c1a; --verde2:#2a7a2a; --verde-bg:#e8f5e0;
  --amarelo:#e6a817; --amarelo-bg:#fff8e1;
  --vermelho:#c62828; --vermelho-bg:#ffebee;
  --cinza:#6b7280; --borda:#c8cfd8; --bg:#f0f7ec;
  --branco:#fff; --texto:#1a1a1a; --muted:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:40px;-webkit-user-select:none;user-select:none}

/* TOPO — compacto */
.topo{background:var(--verde);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.topo-logo{font-size:15px;font-weight:900}
.topo-data{font-size:10px;opacity:.7;margin-top:1px}
.sync-badge{font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:5px}
.sync-badge.offline{background:rgba(255,255,255,.15);color:#fff}
.sync-badge.online{background:#22c55e;color:#fff}
.sync-badge.enviado{background:#3b82f6;color:#fff}
.sync-badge.enviando{background:var(--amarelo);color:#fff}

/* PROGRESS — escondido por default, só aparece com contagens */
.progress-wrap{background:var(--branco);padding:8px 16px;border-bottom:1px solid var(--borda)}
.progress-info{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:4px}
.progress-info strong{color:var(--verde);font-size:14px;font-weight:900}
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--verde);border-radius:3px;transition:width .3s}

/* ════════ TELA INICIO ════════ */
.lista-areas{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Card de area — grande, tactil, preenchido com cor */
.area-card{border-radius:16px;overflow:hidden;transition:all .2s;border:none}
.area-card.aberta{grid-column:1/-1;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.area-card-header{padding:16px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:80px;justify-content:center;gap:4px;color:#fff}
.area-card-header:active{transform:scale(.95);opacity:.85}
.area-card-icon{font-size:36px;font-weight:900;letter-spacing:1px;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.area-card-nome{font-size:15px;font-weight:800;color:#fff;line-height:1;opacity:.95}
.area-card-nome.nome-grande{font-size:20px;font-weight:900;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.area-card-footer{background:rgba(255,255,255,.95);padding:8px 0;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer}
.area-card-status{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:900;color:#333}
.area-card-status .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.area-card-status .dot.verm{background:#d32f2f}
.area-card-status .dot.amar{background:#f9a825}
.area-card-status .dot.ok{background:#2e7d32}
.area-card-bar{flex:1;max-width:60px;height:5px;border-radius:3px;background:rgba(0,0,0,.1);overflow:hidden}
.area-card-bar-fill{height:100%;border-radius:3px;background:#2e7d32;transition:width .3s}

/* Cores por area — card inteiro preenchido */
.area-card[data-cor="A1"]{background:#2e7d32}
.area-card[data-cor="C"]{background:#1565c0}
.area-card[data-cor="D"]{background:#7b1fa2}
.area-card[data-cor="A2"]{background:#e65100}
.area-card[data-cor="MC"]{background:#d32f2f}
.area-card[data-cor="MB"]{background:#00838f}
.area-card[data-cor="MA"]{background:#f9a825}
.area-card[data-cor="MA"] .area-card-header{color:#333}
.area-card[data-cor="MA"] .area-card-nome{color:#333}
.area-card[data-cor="MA"] .area-card-status{color:#333}
.area-card[data-cor="MA"] .area-card-icon{text-shadow:none}

/* Eitos dentro do card */
.area-eitos{display:none;padding:6px 8px 14px;background:var(--branco);border-top:2px solid rgba(0,0,0,.1)}
.area-card.aberta .area-eitos{display:block}
.eitos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

/* Botao de eito — grande e claro */
.eito-btn{background:var(--bg);border:3px solid var(--borda);border-radius:12px;padding:12px 8px;cursor:pointer;transition:all .1s;-webkit-tap-highlight-color:transparent;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.eito-btn:active{transform:scale(.94);background:var(--verde-bg)}
.eito-btn.concluido{border-color:var(--verde);background:var(--verde-bg)}
.eito-btn.programado{border-color:var(--amarelo);background:var(--amarelo-bg)}
.eito-id{font-size:17px;font-weight:900;color:var(--verde);line-height:1}
.eito-check{font-size:16px;margin-top:2px}
.eito-dias{font-size:11px;font-weight:800;margin-top:4px;padding:2px 8px;border-radius:6px}
.dias-verde{background:var(--verde-bg);color:var(--verde)}
.dias-amarelo{background:var(--amarelo-bg);color:var(--amarelo)}
.dias-vermelho{background:var(--vermelho-bg);color:var(--vermelho)}
.eito-resultado{font-size:11px;color:var(--verde);font-weight:800;margin-top:2px}

/* Secao programados */
.prog-section{padding:0 12px;margin-bottom:8px}
.prog-titulo{font-size:12px;font-weight:800;color:var(--amarelo);text-transform:uppercase;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.prog-titulo::before{content:'';display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--amarelo)}
.prog-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

/* ════════ TELA CONTAGEM ════════ */
#tela-contagem{display:none;padding:8px 10px;min-height:100vh;display:none;flex-direction:column}
.eito-header{background:var(--verde);color:#fff;border-radius:12px;padding:10px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.eito-header-area{font-size:11px;opacity:.8;text-transform:uppercase;font-weight:700}
.eito-header-id{font-size:26px;font-weight:900;line-height:1}
.eito-header-plantas{font-size:11px;opacity:.7}

.campo-wrap{background:var(--branco);border:3px solid var(--borda);border-radius:14px;padding:8px 10px;margin-bottom:6px}
.campo-label{font-size:15px;font-weight:900;color:var(--texto);text-transform:uppercase;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.campo-dot{width:12px;height:12px;border-radius:50%}
.campo-dot.mesa{background:var(--verde)}
.campo-dot.fabrica{background:var(--amarelo)}
.campo-input{width:100%;font-size:44px;font-weight:900;color:var(--texto);border:none;outline:none;text-align:center;background:transparent;padding:0;-webkit-appearance:none;line-height:1.2}
.campo-input::placeholder{color:#d1d5db}
.campo-input:focus{color:var(--verde)}
.campo-ajuste{display:flex;align-items:center;gap:4px;margin-top:4px}
.btn-aj{flex:1;padding:10px 2px;border:2px solid var(--borda);border-radius:10px;background:var(--bg);font-size:17px;font-weight:900;color:var(--verde);cursor:pointer;text-align:center}
.btn-aj:active{background:var(--verde-bg);transform:scale(.94)}
.btn-aj.minus{color:var(--vermelho)}

.total-box{background:var(--verde-bg);border:3px solid var(--verde);border-radius:12px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.total-label{font-size:14px;font-weight:800;color:var(--verde);text-transform:uppercase}
.total-val{font-size:30px;font-weight:900;color:var(--verde)}

.btn-grande{display:block;width:100%;padding:16px;background:var(--verde);color:#fff;border:none;border-radius:14px;font-size:20px;font-weight:900;cursor:pointer;text-align:center;transition:all .12s;letter-spacing:.5px}
.btn-grande:active{background:var(--verde2);transform:scale(.97)}
.btn-grande.sec{background:var(--branco);color:var(--verde);border:3px solid var(--verde);font-size:15px;padding:12px}

/* ════════ TELA RESUMO ════════ */
#tela-resumo{display:none;padding:16px}
.resumo-header{text-align:center;padding:16px 0 14px}
.resumo-icon{font-size:52px;margin-bottom:6px}
.resumo-titulo{font-size:22px;font-weight:900;color:var(--verde)}
.resumo-sub{font-size:14px;color:var(--muted);font-weight:600}

.resumo-card{background:var(--branco);border:2px solid var(--borda);border-radius:14px;overflow:hidden;margin-bottom:10px}
.resumo-card-header{background:var(--verde-bg);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--borda)}
.resumo-card-area{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase}
.resumo-card-id{font-size:18px;font-weight:900;color:var(--verde)}
.resumo-card-body{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center}
.r-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:800;margin-bottom:2px}
.r-val{font-size:22px;font-weight:900}
.r-val.verde{color:var(--verde)}
.r-val.amar{color:var(--amarelo)}

.total-dia-box{background:var(--verde);color:#fff;border-radius:16px;padding:18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.total-dia-label{font-size:14px;opacity:.9;font-weight:800;text-transform:uppercase}
.total-dia-val{font-size:36px;font-weight:900}

.sync-status{text-align:center;font-size:13px;color:var(--muted);padding:8px 10px 16px;line-height:1.5;font-weight:600}
.btn-grande.enviar{background:#25D366}
.btn-grande.enviar:active{background:#1da851}

@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .3s ease forwards}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--verde);color:#fff;padding:14px 28px;border-radius:14px;font-size:16px;font-weight:800;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topo">
  <div style="display:flex;align-items:center;gap:8px">
    <img src="logo.png" alt="Neofrut" style="height:32px;width:32px;border-radius:6px">
    <div>
      <div class="topo-logo">CONTAGEM DE COCO</div>
      <div class="topo-data" id="topo-data"></div>
    </div>
  </div>
  <div class="sync-badge offline" id="sync-badge">SEM SINAL</div>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-info">
    <span>Progresso</span>
    <strong id="progress-txt">0 / 0</strong>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<!-- TELA INICIO -->
<div id="tela-inicio">
  <div id="lista-eitos"></div>
  <div id="sem-eitos" style="display:none;text-align:center;padding:40px 20px;color:var(--muted);font-size:14px">
    Nenhum eito carregado.<br>Conecte ao Wi-Fi para sincronizar.
  </div>
</div>

<!-- TELA CONTAGEM -->
<div id="tela-contagem">
  <div class="eito-header">
    <div>
      <div class="eito-header-area" id="cnt-area"></div>
      <div class="eito-header-id" id="cnt-id"></div>
    </div>
    <div class="eito-header-plantas" id="cnt-plantas"></div>
  </div>
  <div class="campo-wrap">
    <div class="campo-label"><span class="campo-dot mesa"></span> MESA</div>
    <input class="campo-input" type="number" id="inp-mesa" inputmode="numeric" pattern="[0-9]*" placeholder="0" min="0">
    <div class="campo-ajuste">
      <button class="btn-aj minus" onclick="aj('mesa',-10)">-10</button>
      <button class="btn-aj minus" onclick="aj('mesa',-1)">-1</button>
      <button class="btn-aj" onclick="aj('mesa',1)">+1</button>
      <button class="btn-aj" onclick="aj('mesa',10)">+10</button>
      <button class="btn-aj" onclick="aj('mesa',100)">+100</button>
    </div>
  </div>
  <div class="campo-wrap">
    <div class="campo-label"><span class="campo-dot fabrica"></span> FABRICA</div>
    <input class="campo-input" type="number" id="inp-fabrica" inputmode="numeric" pattern="[0-9]*" placeholder="0" min="0">
    <div class="campo-ajuste">
      <button class="btn-aj minus" onclick="aj('fab',-10)">-10</button>
      <button class="btn-aj minus" onclick="aj('fab',-1)">-1</button>
      <button class="btn-aj" onclick="aj('fab',1)">+1</button>
      <button class="btn-aj" onclick="aj('fab',10)">+10</button>
      <button class="btn-aj" onclick="aj('fab',100)">+100</button>
    </div>
  </div>
  <div class="total-box">
    <span class="total-label">TOTAL</span>
    <span class="total-val" id="total-eito">0</span>
  </div>
  <button class="btn-grande" onclick="confirmarEito()">CONFIRMAR</button>
  <button class="btn-grande sec" onclick="voltarInicio()" style="margin-top:8px">VOLTAR</button>
</div>

<!-- TELA RESUMO -->
<div id="tela-resumo">
  <div class="resumo-header">
    <div class="resumo-icon pop">✅</div>
    <div class="resumo-titulo">Contagem do dia</div>
    <div class="resumo-sub" id="resumo-sub"></div>
  </div>
  <div id="resumo-lista"></div>
  <div class="total-dia-box">
    <span class="total-dia-label">Total do dia</span>
    <span class="total-dia-val" id="total-dia">0</span>
  </div>
  <div class="sync-status" id="sync-status">Verificando conexao...</div>
  <button class="btn-grande enviar" onclick="tentarSync()">Enviar agora</button>
  <button class="btn-grande sec" onclick="voltarDoResumo()" style="margin-top:10px">Voltar para eitos</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const SB_URL = 'https://gdskveecuarclajuchfx.supabase.co';
const SB_KEY = 'sb_publishable_ocksk4S_Gw9cAXCZSHtFmw_l0IqAERL';
const _SB = supabase.createClient(SB_URL, SB_KEY);

const SK_EITOS = 'nado_eitos_cache';
const SK_COLHEITAS = 'nado_colheitas_cache';
const SK_PROG = 'nado_programacao_cache';
const SK_RESULTADOS = 'nado_resultados';
const SK_FILA = 'nado_fila_envio';

// ── ESTADO ──
let todosEitos = {};      // {area: [{id, plantas}]}
let ultimaColheita = {};  // {"AREA-eito": "YYYY-MM-DD"}
let programados = [];     // [{area, eito_id}]
let resultados = {};      // {"AREA||eito": {area,id,mesa,fabrica,total,hora,data}}
let filaEnvio = [];       // resultados aguardando sync
let eitoAtual = null;     // {area, id, plantas}
let wakeLock = null;
let areasAbertas = {};    // controle de collapse

// ── UTILS ──
function hoje() { return new Date().toISOString().split('T')[0]; }
function fmtData() {
  const d = new Date();
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtN(n) { return (n||0).toLocaleString('pt-BR'); }
function gVal(id) { return parseInt(document.getElementById(id).value) || 0; }
function diasDesde(data) {
  if (!data) return null;
  const d = new Date(data+'T00:00:00'), h = new Date(); h.setHours(0,0,0,0);
  return Math.floor((h-d)/86400000);
}
function diasClass(dias) {
  if (dias === null) return 'dias-vermelho';
  if (dias >= 21) return 'dias-vermelho';
  if (dias >= 15) return 'dias-amarelo';
  return 'dias-verde';
}
function calcDataFromDias(dias) {
  if (dias == null) return null;
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - dias);
  return d.toISOString().split('T')[0];
}
function chaveEito(area, id) { return area + '||' + id; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── SYNC SUPABASE ──
async function sincronizarDados() {
  if (!navigator.onLine) return false;
  try {
    atualizarSyncBadge('enviando');

    // 1. Carregar eitos da nado_programacao (sem RLS, Jamille popula com todos os eitos)
    // Buscar data mais recente disponível (pode ser hoje ou data anterior)
    const { data: progAll } = await _SB.from('nado_programacao')
      .select('area,eito_id,plantas,sugerido,dias_desde,data')
      .order('data', { ascending: false });

    if (progAll && progAll.length > 0) {
      // Pegar dados da data mais recente
      const dataRecente = progAll[0].data;
      const progHoje = progAll.filter(p => p.data === dataRecente);

      todosEitos = {};
      programados = [];
      progHoje.forEach(e => {
        if (!todosEitos[e.area]) todosEitos[e.area] = [];
        if (!todosEitos[e.area].find(x => x.id === e.eito_id)) {
          todosEitos[e.area].push({ id: e.eito_id, plantas: e.plantas || 0 });
        }
        // Sugeridos
        if (e.sugerido) programados.push({ area: e.area, eito_id: e.eito_id });
        // Dias desde ultima colheita
        if (e.dias_desde != null) {
          ultimaColheita[chaveEito(e.area, e.eito_id)] = calcDataFromDias(e.dias_desde);
        }
      });
      localStorage.setItem(SK_PROG, JSON.stringify({ data: hoje(), items: programados }));
    } else {
      // Fallback: tentar tabela eitos (requer auth)
      try {
        const { data: eitosDb } = await _SB.from('eitos').select('area,eito_id,plantas');
        if (eitosDb && eitosDb.length > 0) {
          todosEitos = {};
          eitosDb.forEach(e => {
            if (!todosEitos[e.area]) todosEitos[e.area] = [];
            todosEitos[e.area].push({ id: e.eito_id, plantas: e.plantas || 0 });
          });
        }
      } catch(e) {} // Sem auth, usa cache local
    }

    // Ordenar numericamente
    Object.values(todosEitos).forEach(arr => arr.sort((a, b) => {
      const na = parseInt(a.id.replace(/\D.*/, '')) || 0;
      const nb = parseInt(b.id.replace(/\D.*/, '')) || 0;
      return na - nb;
    }));
    if (Object.keys(todosEitos).length > 0) {
      localStorage.setItem(SK_EITOS, JSON.stringify(todosEitos));
      localStorage.setItem(SK_COLHEITAS, JSON.stringify(ultimaColheita));
    }

    // 4. Enviar fila pendente
    await enviarFila();

    atualizarSyncBadge('online');
    return true;
  } catch (e) {
    console.error('Sync erro:', e);
    atualizarSyncBadge('offline');
    return false;
  }
}

async function enviarFila() {
  if (filaEnvio.length === 0) return;
  atualizarSyncBadge('enviando');
  const enviados = [];
  for (const r of filaEnvio) {
    try {
      const { error } = await _SB.from('nado_contagens').upsert({
        data: r.data, area: r.area, eito_id: r.id,
        mesa: r.mesa, fabrica: r.fabrica, total: r.total,
        hora: r.hora, status: 'pendente'
      }, { onConflict: 'data,area,eito_id' });
      if (!error) enviados.push(r);
    } catch (e) { console.error('Envio erro:', e); }
  }
  filaEnvio = filaEnvio.filter(r => !enviados.includes(r));
  localStorage.setItem(SK_FILA, JSON.stringify(filaEnvio));
  if (filaEnvio.length === 0 && enviados.length > 0) {
    atualizarSyncBadge('enviado');
    toast('Dados enviados!');
  }
}

async function tentarSync() {
  if (!navigator.onLine) { toast('Sem conexao'); return; }
  await enviarFila();
  atualizarSyncStatus();
}

// ── CARREGAR CACHE LOCAL ──
function carregarCache() {
  try { todosEitos = JSON.parse(localStorage.getItem(SK_EITOS)) || {}; } catch(e) {}
  try { ultimaColheita = JSON.parse(localStorage.getItem(SK_COLHEITAS)) || {}; } catch(e) {}
  try {
    const p = JSON.parse(localStorage.getItem(SK_PROG));
    programados = (p && p.data === hoje()) ? p.items : [];
  } catch(e) { programados = []; }
  try { resultados = JSON.parse(localStorage.getItem(SK_RESULTADOS)) || {}; } catch(e) { resultados = {}; }
  // Limpar resultados de outros dias
  const h = hoje();
  Object.keys(resultados).forEach(k => { if (resultados[k].data !== h) delete resultados[k]; });
  try { filaEnvio = JSON.parse(localStorage.getItem(SK_FILA)) || []; } catch(e) { filaEnvio = []; }
}

function salvarResultados() {
  localStorage.setItem(SK_RESULTADOS, JSON.stringify(resultados));
}

// ── BADGE SYNC ──
function atualizarSyncBadge(estado) {
  const el = document.getElementById('sync-badge');
  el.className = 'sync-badge ' + estado;
  const labels = { offline: 'SEM SINAL', online: 'CONECTADO', enviado: 'ENVIADO', enviando: 'ENVIANDO...' };
  el.textContent = labels[estado] || estado;
}

function atualizarSyncStatus() {
  const el = document.getElementById('sync-status');
  if (filaEnvio.length === 0 && Object.keys(resultados).length > 0) {
    el.innerHTML = '✅ Todos os dados foram enviados';
    atualizarSyncBadge('enviado');
  } else if (filaEnvio.length > 0) {
    el.innerHTML = `⏳ ${filaEnvio.length} eito(s) aguardando envio`;
    atualizarSyncBadge(navigator.onLine ? 'online' : 'offline');
  } else {
    el.innerHTML = 'Nenhuma contagem realizada';
    atualizarSyncBadge(navigator.onLine ? 'online' : 'offline');
  }
}

// ── RENDER LISTA ──
function renderLista() {
  const el = document.getElementById('lista-eitos');
  el.innerHTML = '';
  const ordemAreas = ['AREA A1','AREA C','AREA D','AREA A2','MAMÃO DE CIMA','MAMÃO DE BAIXO','MARACUJÁ'];
  const areasExistentes = Object.keys(todosEitos);
  const areas = ordemAreas.filter(a => areasExistentes.includes(a)).concat(areasExistentes.filter(a => !ordemAreas.includes(a)));
  if (areas.length === 0) { document.getElementById('sem-eitos').style.display = 'block'; return; }
  document.getElementById('sem-eitos').style.display = 'none';

  const contados = Object.keys(resultados).length;

  // Progresso
  if (contados > 0) {
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('progress-txt').textContent = `${contados} contado${contados>1?'s':''}`;
    document.getElementById('progress-fill').style.width = `${Math.min(100,(contados/Math.max(1,programados.length||contados))*100)}%`;
  }

  // Programados no topo (eitos soltos, sem card de area)
  if (programados.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'prog-section';
    sec.innerHTML = `<div class="prog-titulo">PROGRAMADOS HOJE (${programados.length})</div>`;
    const grid = document.createElement('div');
    grid.className = 'prog-grid';
    programados.forEach(p => {
      const eito = (todosEitos[p.area] || []).find(e => e.id === p.eito_id);
      if (!eito) return;
      grid.appendChild(criarEitoBtn(p.area, eito, true));
    });
    sec.appendChild(grid);
    el.appendChild(sec);
  }

  // Cards por area
  const wrap = document.createElement('div');
  wrap.className = 'lista-areas';

  // Mapa de siglas e cores
  const corMap = {
    'AREA A1':'A1','AREA C':'C','AREA D':'D','AREA A2':'A2',
    'MAMÃO DE CIMA':'MC','MAMÃO DE BAIXO':'MB','MARACUJÁ':'MA'
  };
  // Sigla vazia = só mostra o icone grande; sigla vazia + nome = só mostra nome
  const nomesCurtos = {
    'AREA A1':'','AREA C':'','AREA D':'','AREA A2':'',
    'MAMÃO DE CIMA':'MAMÃO DE CIMA','MAMÃO DE BAIXO':'MAMÃO DE BAIXO','MARACUJÁ':'MARACUJÁ'
  };
  // Areas que NÃO mostram sigla (só nome)
  const semSigla = new Set(['MAMÃO DE CIMA','MAMÃO DE BAIXO','MARACUJÁ']);

  areas.forEach(area => {
    const eitos = todosEitos[area];
    const aberta = areasAbertas[area] === true;

    // Calcular resumo da area
    let urgentes = 0, ok = 0, feitos = 0;
    eitos.forEach(e => {
      const k = chaveEito(area, e.id);
      if (resultados[k]) { feitos++; return; }
      const d = diasDesde(ultimaColheita[k]);
      if (d === null || d >= 21) urgentes++;
      else if (d >= 15) ok++; // amarelo
    });

    const sigla = corMap[area] || area.replace('AREA ', '').substring(0, 2);
    const nome = area in nomesCurtos ? nomesCurtos[area] : area;

    // Status: mostrar feitos (verde) e urgentes (vermelho)
    let statusHtml = '';
    if (feitos > 0) {
      statusHtml += `<span class="dot ok"></span><span>${feitos}</span>`;
    }
    if (urgentes > 0) {
      statusHtml += `<span class="dot verm"></span><span>${urgentes}</span>`;
    }

    // Barra de progresso (feitos / total)
    const pct = eitos.length > 0 ? Math.round((feitos / eitos.length) * 100) : 0;
    const barHtml = feitos > 0 ? `<div class="area-card-bar"><div class="area-card-bar-fill" style="width:${pct}%"></div></div>` : '';

    const card = document.createElement('div');
    card.className = 'area-card' + (aberta ? ' aberta' : '');
    card.id = 'card-' + area.replace(/\s/g, '_');
    card.setAttribute('data-cor', sigla);

    const mostrarSigla = !semSigla.has(area);
    const hasFooter = statusHtml || barHtml;
    card.innerHTML = `
      <div class="area-card-header" onclick="toggleArea('${area}')">
        ${mostrarSigla ? `<div class="area-card-icon">${sigla}</div>` : ''}
        ${nome ? `<div class="area-card-nome${mostrarSigla ? '' : ' nome-grande'}">${nome}</div>` : ''}
      </div>
      ${hasFooter ? `<div class="area-card-footer" onclick="toggleArea('${area}')">${statusHtml ? `<div class="area-card-status">${statusHtml}</div>` : ''}${barHtml}</div>` : ''}
      <div class="area-eitos">
        <div class="eitos-grid" id="grid-${area.replace(/\s/g, '_')}"></div>
      </div>
    `;
    wrap.appendChild(card);

    // Preencher grid de eitos
    const grid = card.querySelector('.eitos-grid');
    eitos.forEach(eito => grid.appendChild(criarEitoBtn(area, eito, false)));
  });
  el.appendChild(wrap);
}

function criarEitoBtn(area, eito, isProgramado) {
  const k = chaveEito(area, eito.id);
  const feito = resultados[k];
  const dias = diasDesde(ultimaColheita[k]);
  const diasTxt = dias !== null ? dias + ' dias' : '?';

  const div = document.createElement('div');
  div.className = 'eito-btn' + (feito ? ' concluido' : isProgramado ? ' programado' : '');
  div.onclick = () => abrirContagem(area, eito);

  div.innerHTML = `
    <span class="eito-id">${eito.id}</span>
    ${feito
      ? `<span class="eito-check">✅</span><span class="eito-resultado">${fmtN(feito.total)}</span>`
      : `<span class="eito-dias ${diasClass(dias)}">${diasTxt}</span>`
    }
  `;
  return div;
}

function toggleArea(area) {
  // Fechar outras areas (accordion)
  Object.keys(todosEitos).forEach(a => {
    if (a !== area) areasAbertas[a] = false;
  });
  areasAbertas[area] = !areasAbertas[area];
  // Atualizar visual
  document.querySelectorAll('.area-card').forEach(c => c.classList.remove('aberta'));
  if (areasAbertas[area]) {
    const cardEl = document.getElementById('card-' + area.replace(/\s/g, '_'));
    if (cardEl) {
      cardEl.classList.add('aberta');
      // Scroll suave para o card
      setTimeout(() => cardEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }
  }
}

// ── CONTAGEM ──
function abrirContagem(area, eito) {
  eitoAtual = { area, ...eito };
  const k = chaveEito(area, eito.id);
  const existente = resultados[k];

  document.getElementById('cnt-area').textContent = area;
  document.getElementById('cnt-id').textContent = 'Eito ' + eito.id;
  document.getElementById('cnt-plantas').textContent = eito.plantas + ' plantas';
  document.getElementById('inp-mesa').value = existente ? existente.mesa : '';
  document.getElementById('inp-fabrica').value = existente ? existente.fabrica : '';
  atualizarTotal();

  document.getElementById('tela-inicio').style.display = 'none';
  document.getElementById('tela-contagem').style.display = 'block';
  // Esconder topo e progresso para maximizar espaço
  document.querySelector('.topo').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  window.scrollTo(0, 0);
  ativarWakeLock();
}

function atualizarTotal() {
  document.getElementById('total-eito').textContent = fmtN(gVal('inp-mesa') + gVal('inp-fabrica'));
}
['inp-mesa','inp-fabrica'].forEach(id => {
  document.getElementById(id).addEventListener('input', atualizarTotal);
});

function aj(campo, val) {
  const id = campo === 'mesa' ? 'inp-mesa' : 'inp-fabrica';
  const el = document.getElementById(id);
  el.value = Math.max(0, (parseInt(el.value) || 0) + val);
  atualizarTotal();
}

function confirmarEito() {
  const mesa = gVal('inp-mesa'), fab = gVal('inp-fabrica');
  if (mesa + fab === 0) { toast('Preencha mesa ou fabrica'); return; }

  const k = chaveEito(eitoAtual.area, eitoAtual.id);
  const agora = new Date();
  const resultado = {
    area: eitoAtual.area, id: eitoAtual.id,
    mesa, fabrica: fab, total: mesa + fab,
    data: hoje(),
    hora: agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0')
  };
  resultados[k] = resultado;
  salvarResultados();

  // Adicionar a fila de envio
  filaEnvio = filaEnvio.filter(r => chaveEito(r.area, r.id) !== k);
  filaEnvio.push(resultado);
  localStorage.setItem(SK_FILA, JSON.stringify(filaEnvio));

  // Tentar enviar imediatamente se online
  if (navigator.onLine) enviarFila();

  // Vibrar
  if (navigator.vibrate) navigator.vibrate(100);

  toast('Eito ' + eitoAtual.id + ' confirmado');
  voltarInicio();
}

function voltarInicio() {
  desativarWakeLock();
  document.getElementById('tela-contagem').style.display = 'none';
  document.getElementById('tela-resumo').style.display = 'none';
  document.getElementById('tela-inicio').style.display = 'block';
  document.querySelector('.topo').style.display = '';
  renderLista();
  window.scrollTo(0, 0);
}

// ── RESUMO ──
function mostrarResumo() {
  const lista = document.getElementById('resumo-lista');
  lista.innerHTML = '';
  let totalDia = 0;
  const vals = Object.values(resultados);
  if (vals.length === 0) { toast('Nenhuma contagem'); return; }

  vals.forEach(r => {
    totalDia += r.total;
    const div = document.createElement('div');
    div.className = 'resumo-card';
    div.innerHTML = `
      <div class="resumo-card-header">
        <span class="resumo-card-area">${r.area}</span>
        <span class="resumo-card-id">Eito ${r.id}</span>
      </div>
      <div class="resumo-card-body">
        <div><div class="r-label">Mesa</div><div class="r-val verde">${fmtN(r.mesa)}</div></div>
        <div><div class="r-label">Fabrica</div><div class="r-val amar">${fmtN(r.fabrica)}</div></div>
        <div><div class="r-label">Total</div><div class="r-val">${fmtN(r.total)}</div></div>
      </div>
    `;
    lista.appendChild(div);
  });
  document.getElementById('total-dia').textContent = fmtN(totalDia);
  document.getElementById('resumo-sub').textContent = vals.length + ' eitos contados';
  atualizarSyncStatus();

  document.getElementById('tela-inicio').style.display = 'none';
  document.getElementById('tela-contagem').style.display = 'none';
  document.getElementById('tela-resumo').style.display = 'block';
  window.scrollTo(0, 0);
}

function voltarDoResumo() { voltarInicio(); }

// ── WAKE LOCK ──
async function ativarWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}
function desativarWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ── ONLINE/OFFLINE LISTENERS ──
window.addEventListener('online', () => {
  atualizarSyncBadge('online');
  if (filaEnvio.length > 0) enviarFila();
});
window.addEventListener('offline', () => atualizarSyncBadge('offline'));

// ── BOTAO RESUMO (adicionar dinamicamente) ──
function addBtnResumo() {
  const contados = Object.keys(resultados).length;
  if (contados === 0) return;
  const existing = document.getElementById('btn-ver-resumo');
  if (existing) existing.remove();
  const btn = document.createElement('div');
  btn.id = 'btn-ver-resumo';
  btn.style.cssText = 'padding:10px 20px 0';
  btn.innerHTML = `<button class="btn-grande sec" onclick="mostrarResumo()" style="font-size:13px;padding:12px">Ver resumo do dia (${contados} eitos)</button>`;
  document.getElementById('lista-eitos').appendChild(btn);
}

// ── INIT ──
document.getElementById('topo-data').textContent = fmtData();
carregarCache();
renderLista();
addBtnResumo();
atualizarSyncBadge(navigator.onLine ? 'online' : 'offline');

// Sync ao iniciar
if (navigator.onLine) sincronizarDados().then(() => { renderLista(); addBtnResumo(); });

// Retry a cada 30s
setInterval(() => {
  if (navigator.onLine && filaEnvio.length > 0) enviarFila();
}, 30000);

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
